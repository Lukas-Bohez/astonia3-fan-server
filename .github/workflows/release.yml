name: Release Build

on:
  release:
    types: [created]

jobs:
  build-and-package:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup tools
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            choco install -y cmake visualstudio2019buildtools argon2
          else
            sudo apt-get update
            sudo apt-get install -y build-essential cmake libmysqlclient-dev libargon2-dev
          fi

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cmake .. -G "Visual Studio 16 2019" -A x64 -DCMAKE_BUILD_TYPE=Release -DUSE_ARGON2=ON
            cmake --build . --config Release -- /m
          else
            cmake .. -DCMAKE_BUILD_TYPE=Release -DUSE_ARGON2=ON
            cmake --build . --parallel
          fi

      - name: Collect release binaries
        run: |
          mkdir -p release_bundle
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "build/Release/astonia3-server.exe" release_bundle/ 2>/dev/null || true
            cp "build/Release/chatserver.exe" release_bundle/ 2>/dev/null || true
            cp "build/Release/create_account.exe" release_bundle/ 2>/dev/null || true
            cp "build/Release/create_character.exe" release_bundle/ 2>/dev/null || true
          else
            cp build/bin/astonia3-server release_bundle/ 2>/dev/null || true
            cp build/bin/chatserver release_bundle/ 2>/dev/null || true
            cp build/bin/create_account release_bundle/ 2>/dev/null || true
            cp build/bin/create_character release_bundle/ 2>/dev/null || true
          fi
          cp README.md release_bundle/
          cp todo.md release_bundle/
          cp config/server.conf.example release_bundle/server.conf.example

      - name: Create release archive
        run: |
          TAG=${GITHUB_REF##*/}
          mkdir -p artifacts
          tar -czf artifacts/astonia3-fan-server-${TAG}.tar.gz -C release_bundle .

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/astonia3-fan-server-${GITHUB_REF##*/}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v3
        with:
          name: astonia3-fan-server-${{ github.ref_name }}
          path: artifacts/astonia3-fan-server-${{ github.ref_name }}.tar.gz
